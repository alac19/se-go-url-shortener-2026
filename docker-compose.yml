services:
  mysql:
    image: mysql:8
    container_name: shortlink-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: shortlink_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - shortlink-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7.2
    container_name: shortlink-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - shortlink-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  shortlink:
    build: .
    container_name: shortlink-service
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./configs/config.toml:/app/configs/config.toml
    networks:
      - shortlink-net
networks:
  shortlink-net:
    driver: bridge
volumes:
  mysql_data:
  redis_data:
  
